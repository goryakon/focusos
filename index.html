function buildLangSwitcher(){
  const wrap = h("div",{style:{position:"relative",display:"inline-block"}});
  const btn = h("button",{
    style:{background:"transparent",border:"1px solid #252540",borderRadius:"20px",padding:"5px 12px",fontSize:"11px",color:"#666",fontFamily:"monospace",cursor:"pointer",letterSpacing:"0.5px",display:"flex",alignItems:"center",gap:"4px"},
    onClick:(e)=>{
      e.stopPropagation();
      const existing = document.getElementById("lang-dropdown");
      if(existing){existing.remove();return;}
      const dd = h("div",{id:"lang-dropdown",style:{position:"absolute",top:"110%",right:"0",background:"#0f0f1e",border:"1px solid #252540",borderRadius:"10px",overflow:"hidden",zIndex:"999",minWidth:"80px",boxShadow:"0 8px 24px #00000080"}});

        const opt = h("button",{
          style:{display:"block",width:"100%",padding:"9px 14px",background:_lang===code?"#E8FF4715":"transparent",border:"none",color:_lang===code?"#E8FF47":"#888",fontSize:"11px",fontFamily:"monospace",cursor:"pointer",textAlign:"left",letterSpacing:"0.5px"},

        },label);

      });
      wrap.appendChild(dd);

  wrap.appendChild(btn);
  return wrap;
}

function genId(){return Math.random().toString(36).slice(2,9)}
function todayStr(){return new Date().toISOString().slice(0,10)}
function fmtTime(ts){return new Date(ts).toLocaleTimeString(i18n().locale,{hour:"2-digit",minute:"2-digit"})}
function fmtDate(dateStr){
  const dt = new Date(dateStr+"T00:00:00");
  const today = todayStr(), y = new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(dateStr===today) return i18n().today;
  if(dateStr===y) return i18n().yesterday;
  return dt.toLocaleDateString(i18n().locale,{weekday:"long",day:"numeric",month:"long"});
}
function fmtDuration(ms){
  if(!ms||ms<0) return null;
  const m = Math.round(ms/60000);
  if(m<1) return "<1 мин";
  if(m<60) return m+" мин";
  const h=Math.floor(m/60), rem=m%60;
  return h+"ч "+(rem>0?rem+"м":"");
}

async function loadUserData(){

  const {data:row,error} = await supa.from("user_data").select("data").eq("user_id",_currentUser.id).single();

// Сохранение всех данных (дебаунс 1.5с)
let _saveStatus = "saved"; // "saving" | "saved" | "error"
let _ignoreNextUpdate = false; // защита от real-time loop
let _realtimeChannel = null;
function setSaveStatus(s){ _saveStatus=s; const el=document.getElementById("save-status"); if(el) renderSaveStatus(el); }
function renderSaveStatus(el){
  if(_saveStatus==="saving") { el.textContent="↑ saving..."; el.style.color="#555"; }
  else if(_saveStatus==="saved") { el.textContent="✓ saved"; el.style.color="#2ED573"; }
  else { el.textContent="⚠ offline"; el.style.color="#FFA502"; }
}

function scheduleSave(){
  clearTimeout(_saveTimer);
  setSaveStatus("saving");
  _saveTimer = setTimeout(()=>pushUserData(), 1500);
}

async function pushUserData(retries=3){
  if(!_currentUser) return;
  const rowData = {
    tasks: loadTasksLocal(),
    energy: JSON.parse(localStorage.getItem("fo_energy")||"{}"),
  };
  _ignoreNextUpdate = true;
  try {
    // UPDATE existing row
    const {data: updated, error: upErr} = await supa.from("user_data")
      .update({data: rowData, updated_at: new Date().toISOString()})
      .eq("user_id", _currentUser.id)
      .select("user_id");
    if(upErr) throw upErr;
    // No row yet → INSERT
    if(!updated?.length){
      const {error: inErr} = await supa.from("user_data")
        .insert({user_id: _currentUser.id, data: rowData, updated_at: new Date().toISOString()});
      if(inErr) throw inErr;
    }
    setSaveStatus("saved");
  } catch(e) {
    _ignoreNextUpdate = false;
    if(retries > 0) {
      await new Promise(r=>setTimeout(r, 2000));
      return pushUserData(retries-1);
    }
    setSaveStatus("error");
    // Store pending save flag - will retry on next load
    localStorage.setItem("fo_pending_save","1");
  }
}

// Real-time sync — слушаем изменения от других устройств
function subscribeRealtime(){
  if(!_currentUser || _realtimeChannel) return;
  _realtimeChannel = supa
    .channel("user_data:"+_currentUser.id)
    .on("postgres_changes", {
      event: "UPDATE",
      schema: "public",
      table: "user_data",
      filter: `user_id=eq.${_currentUser.id}`
    }, (payload)=>{
      const incoming = payload.new;
      // Пропускаем собственные сохранения (защита от loop)
      if(_ignoreNextUpdate){ _ignoreNextUpdate=false; return; }
      // Применяем данные от другого устройства
      const rowData = incoming.data || {};
      const tasks = rowData.tasks || [];
      const energy = rowData.energy || {};
      localStorage.setItem("fo_tasks", JSON.stringify(tasks));
      localStorage.setItem("fo_energy", JSON.stringify(energy));
      state.tasks = tasks;
      state.energy = (energy.date === todayStr()) ? energy.level : null;
      setSaveStatus("saved");
      render();
    })
    .subscribe();
}

function unsubscribeRealtime(){
  if(_realtimeChannel){ supa.removeChannel(_realtimeChannel); _realtimeChannel=null; }
}

// ── GOOGLE CALENDAR ────────────────────────────────────────────────────────
const GCAL_CLIENT_ID = "712906143464-vn97vghbecdj1i8bcsvkk706ad2jt7ke.apps.googleusercontent.com";
const GCAL_SCOPE = "https://www.googleapis.com/auth/calendar";
const GCAL_API = "https://www.googleapis.com/calendar/v3";
let _gcalToken = localStorage.getItem("fo_gcal_token") || null;
let _gcalTokenExpiry = parseInt(localStorage.getItem("fo_gcal_token_expiry")||"0");
let _gcalCalendarId = localStorage.getItem("fo_gcal_calendar_id") || null;
let _gcalEvents = [];
let _gcalTokenClient = null;
let _calModalData = null;

function gcalIsConnected(){
  return !!(_gcalToken && Date.now() < _gcalTokenExpiry);
}

function gcalConnect(){
  if(!window.google?.accounts?.oauth2){ alert("Google library not loaded yet. Please wait a moment and try again."); return; }
  if(!_gcalTokenClient){
    _gcalTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GCAL_CLIENT_ID,
      scope: GCAL_SCOPE,
      callback: async (resp) => {
        if(resp.error){ console.error("GCal OAuth:",resp.error); return; }
        _gcalToken = resp.access_token;
        _gcalTokenExpiry = Date.now() + (resp.expires_in - 60) * 1000;
        localStorage.setItem("fo_gcal_token", _gcalToken);
        localStorage.setItem("fo_gcal_token_expiry", String(_gcalTokenExpiry));
        try{ await gcalGetOrCreateCalendar(); await gcalFetchEvents(); } catch(e){ console.error("GCal init:",e); }
        render();
      }
    });
  }
  _gcalTokenClient.requestAccessToken();
}

function gcalDisconnect(){
  _gcalToken=null; _gcalTokenExpiry=0; _gcalCalendarId=null; _gcalEvents=[];
  localStorage.removeItem("fo_gcal_token"); localStorage.removeItem("fo_gcal_token_expiry"); localStorage.removeItem("fo_gcal_calendar_id");
  render();
}

async function gcalRequest(method, path, body){
  if(!_gcalToken) throw new Error("not_connected");
  const resp = await fetch(GCAL_API+path, {
    method,
    headers:{"Authorization":"Bearer "+_gcalToken,"Content-Type":"application/json"},
    body: body ? JSON.stringify(body) : undefined
  });
  if(resp.status===401){ gcalDisconnect(); throw new Error("Session expired. Please reconnect Google Calendar."); }
  if(!resp.ok){ const t=await resp.text(); throw new Error("Google Calendar: "+resp.status+" — "+t.slice(0,120)); }
  if(resp.status===204) return null;
  return resp.json();
}

async function gcalGetOrCreateCalendar(){
  if(_gcalCalendarId) return _gcalCalendarId;
  const list = await gcalRequest("GET", "/users/me/calendarList?fields=items(id,summary)");
  const ex = (list.items||[]).find(c=>c.summary==="FocusOS");
  if(ex){ _gcalCalendarId=ex.id; localStorage.setItem("fo_gcal_calendar_id",_gcalCalendarId); return _gcalCalendarId; }
  const cr = await gcalRequest("POST", "/calendars", {summary:"FocusOS", timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone});
  _gcalCalendarId=cr.id; localStorage.setItem("fo_gcal_calendar_id",_gcalCalendarId);
  return _gcalCalendarId;
}

async function gcalFetchEvents(){
  if(!_gcalToken||!_gcalCalendarId) return;
  const now=new Date(), later=new Date(now.getTime()+7*864e5);
  const p=new URLSearchParams({timeMin:now.toISOString(),timeMax:later.toISOString(),singleEvents:"true",orderBy:"startTime",fields:"items(id,summary,start,end)"});
  const data=await gcalRequest("GET","/calendars/"+encodeURIComponent(_gcalCalendarId)+"/events?"+p);
  _gcalEvents=(data?.items||[]).map(e=>({id:e.id,title:e.summary||"(no title)",startDT:e.start?.dateTime||e.start?.date,endDT:e.end?.dateTime||e.end?.date}));
}

async function gcalAddEvent(title,dateStr,timeStr,durationMin){
  if(!_gcalCalendarId) await gcalGetOrCreateCalendar();
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const s=new Date(dateStr+"T"+timeStr+":00"), e=new Date(s.getTime()+durationMin*60000);
  const f=d=>d.toISOString().slice(0,-5);
  return gcalRequest("POST","/calendars/"+encodeURIComponent(_gcalCalendarId)+"/events",{summary:title,start:{dateTime:f(s),timeZone:tz},end:{dateTime:f(e),timeZone:tz}});
}

async function gcalUpdateEvent(eventId,title,dateStr,timeStr,durationMin){
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const s=new Date(dateStr+"T"+timeStr+":00"), e=new Date(s.getTime()+durationMin*60000);
  const f=d=>d.toISOString().slice(0,-5);
  return gcalRequest("PATCH","/calendars/"+encodeURIComponent(_gcalCalendarId)+"/events/"+eventId,{summary:title,start:{dateTime:f(s),timeZone:tz},end:{dateTime:f(e),timeZone:tz}});
}

async function gcalDeleteCalEvent(eventId){
  await gcalRequest("DELETE","/calendars/"+encodeURIComponent(_gcalCalendarId)+"/events/"+eventId);
  _gcalEvents=_gcalEvents.filter(e=>e.id!==eventId);
}

    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys||"",messages:[{role:"user",content:prompt}]})

function updateTasks(tasks){saveTasks(tasks);setState({tasks})}

function toggleTask(id){
  updateTasks(state.tasks.map(t=>{
    if(t.id!==id) return t;
    const nowDone = !t.done;
    const doneAt = nowDone ? Date.now() : null;
    const totalTime = (nowDone && t.startedAt) ? (Date.now()-t.startedAt) : t.totalTime||null;
    return {...t, done:nowDone, doneAt, totalTime};
  }));
  if(state.focusTask?.id===id) setState({modal:null,focusTask:null});
}

function deleteTask(id){
  updateTasks(state.tasks.filter(t=>t.id!==id));
  if(state.focusTask?.id===id) setState({modal:null,focusTask:null});
}

function toggleStep(id, steps, stepIndex){
  updateTasks(state.tasks.map(t=>{
    if(t.id!==id) return t;
    const cs = new Set(t.completedSteps||[]);
    const stepTimes = {...(t.stepTimes||{})};
    const key = String(stepIndex);
    if(cs.has(key)){
      cs.delete(key);
      delete stepTimes[key];
    } else {
      cs.add(key);
      stepTimes[key] = Date.now();
    }
    const startedAt = t.startedAt || Date.now();
    // Update focusTask too
    const updatedTask = {...t, steps, completedSteps:Array.from(cs), stepTimes, startedAt};
    if(state.focusTask?.id===id) state.focusTask = updatedTask;
    return updatedTask;
  }));
}

function addNote(id, text){
  if(!text.trim()) return;
  const updated = state.tasks.map(t=>{
    if(t.id!==id) return t;
    const notes = [...(t.notes||[]), {id:genId(), text:text.trim(), createdAt:Date.now()}];
    return {...t, notes};
  });
  // Sync focusTask BEFORE render so modal shows fresh notes immediately
  if(state.focusTask?.id===id) state.focusTask = updated.find(t=>t.id===id);
  saveTasks(updated);
  setState({tasks:updated});
}

function deleteNote(taskId, noteId){

}

function addStep(taskId, stepText){
  if(!stepText.trim()) return;
  const updated = state.tasks.map(t=>{
    if(t.id!==taskId) return t;
    return {...t, steps:[...(t.steps||[]), stepText.trim()]};
  });

  if(focusAiData) focusAiData.steps = updated.find(t=>t.id===taskId)?.steps||focusAiData.steps;
  saveTasks(updated);

}

function deleteStep(taskId, stepIndex){
  const updated = state.tasks.map(t=>{
    if(t.id!==taskId) return t;
    const steps = t.steps.filter((_,i)=>i!==stepIndex);
    // Remap completedSteps indices
    const oldCs = new Set(t.completedSteps||[]);
    const newCs = [];
    const oldTimes = t.stepTimes||{};
    const newTimes = {};
    let ni=0;
    t.steps.forEach((_, oi)=>{
      if(oi===stepIndex) return;
      if(oldCs.has(String(oi))) newCs.push(String(ni));
      if(oldTimes[String(oi)]) newTimes[String(ni)]=oldTimes[String(oi)];
      ni++;
    });
    return {...t, steps, completedSteps:newCs, stepTimes:newTimes};
  });
  if(state.focusTask?.id===taskId) state.focusTask = updated.find(t=>t.id===taskId);
  if(focusAiData) focusAiData.steps = updated.find(t=>t.id===taskId)?.steps||[];
  saveTasks(updated);
  setState({tasks:updated});
}

function updateStepText(taskId, stepIndex, newText){
  const updated = state.tasks.map(t=>{
    if(t.id!==taskId) return t;
    const steps=[...t.steps];

    return {...t, steps};

  if(state.focusTask?.id===taskId) state.focusTask = updated.find(t=>t.id===taskId);

  saveTasks(updated);
  setState({tasks:updated});
}

function addFile(taskId, file){

  const reader = new FileReader();
  reader.onload = e=>{

  reader.readAsDataURL(file);

// ── MIC ────────────────────────────────────────────────────────────────────
async function startRecording(){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setDump({error:"Голосовой ввод не поддерживается в этом браузере."});return}
  _liveTranscript = state.dump.transcript;
  const rec = new SR();
  rec.lang=i18n().locale; rec.continuous=true; rec.interimResults=true;
  let final=_liveTranscript?_liveTranscript+" ":"";
  rec.onresult=(e)=>{
    let interim="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript+" ";
      else interim=e.results[i][0].transcript;
    }
    _liveTranscript=final+interim;
    const ta=document.getElementById("dump-textarea");
    if(ta) ta.value=_liveTranscript;
    setDumpSilent({transcript:_liveTranscript});
    const ab=document.getElementById("analyze-btn");
    if(ab) ab.style.display=_liveTranscript.trim()?"block":"none";
  };
  rec.onerror=(e)=>{
    let msg="Ошибка записи: "+e.error;
    if(e.error==="network") msg="⚠️ Ошибка сети: нет доступа к Google Speech API. Проверь интернет.";
    if(e.error==="not-allowed") msg="🚫 Доступ к микрофону запрещён.";
    if(e.error==="no-speech") msg="Речь не обнаружена. Говори ближе к микрофону.";
    setDump({error:msg,isRecording:false});
    recognition=null;
  };
  rec.onend=()=>{setDump({isRecording:false});recognition=null};
  recognition=rec; rec.start();
  setDump({isRecording:true,error:""});
}
function stopRecording(){recognition?.stop();recognition=null;setDump({isRecording:false})}

async function runAnalyze(){
  const ta=document.getElementById("dump-textarea");
  if(ta) _liveTranscript=ta.value;
  state.dump.transcript=_liveTranscript;
  if(!state.dump.transcript.trim()) return;
  setDump({phase:"processing",error:""});
  try{
    const data=await analyzeBrainDump(state.dump.transcript.trim());
    setDump({phase:"review",result:data,selected:new Set(data.tasks.map((_,i)=>i))});
  }catch(e){setDump({phase:"idle",error:"Ошибка: "+e.message})}
}

// ── RENDER ENGINE ──────────────────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function") el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className") el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false||c===undefined) return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
}
function render(){
  // Save scroll of focus modal before re-render
  const oldWrap = document.querySelector("[data-focus-wrap='1']");
  const savedScroll = oldWrap ? oldWrap.scrollTop : 0;
  document.getElementById("app").replaceChildren(buildApp());
  // Restore scroll
  if(savedScroll > 0){
    const newWrap = document.querySelector("[data-focus-wrap='1']");
    if(newWrap) newWrap.scrollTop = savedScroll;
  }
}

      Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(dk=>{
        const dh=h("div",{style:{marginBottom:"12px",marginTop:"8px",display:"flex",alignItems:"center",gap:"12px"}});
        dh.append(h("span",{style:{fontSize:"11px",color:dk===todayStr()?"#E8FF47":"#444",fontFamily:"monospace",letterSpacing:"0.5px",textTransform:"uppercase",whiteSpace:"nowrap"}},fmtDate(dk)),h("div",{style:{flex:"1",height:"1px",background:"#141422"}}));
        cnt.appendChild(dh);
        groups[dk].forEach(t=>{const c=buildDoneCard(t);c.className="task-in";cnt.appendChild(c)});
      });
    }
  }

  root.appendChild(cnt);
  root.appendChild(h("button",{style:{position:"fixed",bottom:"26px",right:"22px",width:"54px",height:"54px",borderRadius:"50%",background:"#E8FF47",color:"#0a0a14",fontSize:"26px",border:"none",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"300",boxShadow:"0 4px 28px #E8FF4760",zIndex:"20",paddingBottom:"2px"},onClick:()=>setState({modal:"add",add:{title:"",category:"work",priority:"medium",why:"",dueToday:true}})},"+"));

  if(modal==="energy") root.appendChild(buildEnergyModal());
  else if(modal==="add") root.appendChild(buildAddModal());
  else if(modal==="dump") root.appendChild(buildDumpModal());
  else if(modal==="focus") root.appendChild(buildFocusModal());
  else if(modal==="cal") root.appendChild(buildCalendarModal());

  return root;
}

// ── TASK CARD (expandable) ─────────────────────────────────────────────────
function buildTaskCard(task){
  const cat=CATEGORIES[task.category]||CATEGORIES.work;
  const pri=PRIORITIES[task.priority]||PRIORITIES.medium;
  const steps=task.steps||[];
  const cs=new Set(task.completedSteps||[]);
  const hasSteps=steps.length>0;
  const progress=hasSteps?Math.round(cs.size/steps.length*100):null;
  const expanded=state.expandedCards.has(task.id);
  const notesCount=(task.notes||[]).length;
  const attCount=(task.attachments||[]).length;

  const card=h("div",{style:{background:"#0d0d1a",border:"1px solid #141422",borderLeft:`3px solid ${cat.color}`,borderRadius:"10px",marginBottom:"8px",overflow:"hidden",transition:"all 0.15s",opacity:task.done?"0.45":"1"}});

  // Main row
  const row=h("div",{style:{display:"flex",alignItems:"flex-start",gap:"12px",padding:"13px 15px"}});
  const cb=h("button",{style:{width:"22px",height:"22px",borderRadius:"6px",border:`2px solid ${task.done?"#E8FF47":"#2a2a40"}`,background:task.done?"#E8FF47":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0",transition:"all 0.15s"},onClick:(e)=>{e.stopPropagation();toggleTask(task.id)}},task.done?h("span",{style:{color:"#0a0a14",fontSize:"11px",fontWeight:"900"}},"✓"):"");

  const info=h("div",{style:{flex:"1",minWidth:"0",cursor:hasSteps?"pointer":"default"},onClick:hasSteps?()=>toggleExpand(task.id):null});
  info.appendChild(h("div",{style:{fontSize:"14px",color:task.done?"#555":"#f0f0e8",textDecoration:task.done?"line-through":"none",fontWeight:"500",lineHeight:"1.4",display:"flex",alignItems:"center",gap:"6px"}},
    task.title,
    hasSteps?h("span",{style:{fontSize:"10px",color:expanded?"#E8FF47":"#444",transition:"color 0.15s"}},expanded?"▲":"▼"):""
  ));
  const tags=h("div",{style:{display:"flex",gap:"8px",marginTop:"5px",flexWrap:"wrap",alignItems:"center"}});
  tags.append(h("span",{style:{fontSize:"11px",color:cat.color}},cat.icon+" "+cat.label),h("span",{style:{fontSize:"11px",color:pri.color}},pri.dot+" "+pri.label));
  if(task.why) tags.appendChild(h("span",{style:{fontSize:"11px",color:"#555",fontStyle:"italic"}},`"${task.why}"`));
  if(notesCount>0) tags.appendChild(h("span",{style:{fontSize:"10px",color:"#4a4a6a"}},"💬 "+notesCount));
  if(attCount>0) tags.appendChild(h("span",{style:{fontSize:"10px",color:"#4a4a6a"}},"📎 "+attCount));
  info.appendChild(tags);

  if(progress!==null){
    const pbw=h("div",{style:{marginTop:"8px"}});
    const trk=h("div",{style:{height:"3px",background:"#181828",borderRadius:"2px",overflow:"hidden"}});
    trk.appendChild(h("div",{style:{height:"100%",width:progress+"%",background:"#E8FF47",transition:"width 0.3s"}}));
    pbw.appendChild(trk);
    pbw.appendChild(h("span",{style:{fontSize:"10px",color:"#444",marginTop:"2px",display:"block"}},cs.size+"/"+steps.length+" "+i18n().stepsOf));
    info.appendChild(pbw);
  }

  const btns=h("div",{style:{display:"flex",gap:"4px",alignItems:"flex-start",flexShrink:"0"}});
  if(!task.done) btns.appendChild(h("button",{style:{background:"transparent",border:"none",fontSize:"15px",padding:"2px 5px",color:"#666",title:"Открыть полностью"},onClick:(e)=>{e.stopPropagation();openFocus(task)}},"⚡"));
  if(!task.done&&gcalIsConnected()) btns.appendChild(h("button",{style:{background:"transparent",border:"none",fontSize:"13px",padding:"2px 5px",color:"#4ECDC4",opacity:"0.8",title:"Add to Google Calendar"},onClick:(e)=>{e.stopPropagation();_calModalData={mode:"add",title:task.title,date:todayStr(),time:"09:00",durationMin:60};setState({modal:"cal"});}},"📅"));
  btns.appendChild(h("button",{style:{background:"transparent",border:"none",fontSize:"11px",padding:"2px 5px",color:"#444",opacity:"0.4"},onClick:(e)=>{e.stopPropagation();deleteTask(task.id)}},"✕"));
  row.append(cb,info,btns);
  card.appendChild(row);

  // Expandable steps section
  if(expanded&&hasSteps){
    const expSec=h("div",{style:{borderTop:"1px solid #0f0f1e",padding:"10px 15px 14px",background:"#0a0a12"}});
    expSec.appendChild(h("div",{style:{fontSize:"10px",color:"#333",fontFamily:"monospace",marginBottom:"8px",letterSpacing:"0.5px"}},i18n().steps));
    steps.forEach((s,i)=>{
      const done=cs.has(String(i));
      const stepTime=task.stepTimes?.[String(i)];
      const srow=h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"6px 8px",borderRadius:"6px",marginBottom:"4px",cursor:"pointer",background:done?"#0d0d18":"transparent",border:"1px solid "+(done?"#1a1a28":"transparent"),transition:"all 0.12s"},
        onClick:(e)=>{e.stopPropagation();toggleStep(task.id,steps,i)}});
      const ck=h("span",{style:{width:"18px",height:"18px",borderRadius:"4px",flexShrink:"0",border:`2px solid ${done?"#E8FF47":"#2a2a40"}`,display:"flex",alignItems:"center",justifyContent:"center",background:done?"#E8FF47":"transparent",color:"#0a0a14",fontSize:"10px",fontWeight:"900"}},done?"✓":"");
      const sl=h("span",{style:{fontSize:"13px",color:done?"#555":"#c8c8d8",textDecoration:done?"line-through":"none",flex:"1"}},s);
      srow.append(ck,sl);

      expSec.appendChild(srow);
    });

    // Open full button
    const openBtn=h("button",{style:{marginTop:"10px",background:"transparent",border:"1px solid #1e1e2e",borderRadius:"7px",padding:"6px 14px",fontSize:"12px",color:"#888",width:"100%"},onClick:(e)=>{e.stopPropagation();openFocus(task)}},i18n().openTask);
    expSec.appendChild(openBtn);
    card.appendChild(expSec);
  }

  return card;
}

  meta.appendChild(h("span",{style:{fontSize:"11px",color:cat.color,opacity:"0.6"}},cat.icon+" "+cat.label));

  return card;

        analysisArea.appendChild(h("div",{style:{fontSize:"10px",color:"#888",fontFamily:"monospace",marginBottom:"8px"}},i18n().suggestedSteps));

          const sr=h("div",{style:{display:"flex",gap:"8px",alignItems:"center",padding:"6px 8px",borderRadius:"6px",marginBottom:"4px",cursor:"pointer",border:"1px solid #1a1a28",background:"transparent",transition:"all 0.12s"}});
          const chk=h("span",{style:{width:"16px",height:"16px",borderRadius:"4px",border:"2px solid #2a2a40",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"900",color:"#0a0a14",background:"transparent",flexShrink:"0"}},"");
          const sl=h("span",{style:{fontSize:"13px",color:"#e0e0e8",flex:"1"}},s);

              chk.style.background="#E8FF47"; chk.style.borderColor="#E8FF47"; chk.textContent="✓";
              sr.style.background="#E8FF4710"; sr.style.borderColor="#2a2a40";
            }
            addAiStepsBtn.style.opacity = selectedAiSteps.size>0?"1":"0.3";
            addAiStepsBtn.disabled = selectedAiSteps.size===0;
            addAiStepsBtn.textContent = i18n().addSteps+" ("+(selectedAiSteps.size)+")";
          });
          stepRows.push({s,sr});
          analysisArea.appendChild(sr);
        });
        const addAiStepsBtn = h("button",{style:{background:"#E8FF47",color:"#0a0a14",border:"none",borderRadius:"8px",padding:"8px 18px",fontSize:"13px",fontWeight:"700",marginTop:"8px",width:"100%",opacity:"0.3"}},i18n().addSteps+" (0)");
        addAiStepsBtn.disabled = true;
        addAiStepsBtn.addEventListener("click",()=>{
          result.new_steps.forEach((s,i)=>{ if(selectedAiSteps.has(i)) addStep(task.id,s); });
          addAiStepsBtn.textContent=i18n().addedSteps+" "+selectedAiSteps.size+" "+i18n().stepsOf;
          addAiStepsBtn.disabled=true;
          addAiStepsBtn.style.opacity="0.5";

        analysisArea.appendChild(addAiStepsBtn);

        const tb=h("div",{style:{marginTop:"10px",padding:"8px 10px",background:"#0f0f1e",borderRadius:"6px",fontSize:"12px",color:"#888"}},
          "Новое название: ",h("span",{style:{color:"#f0f0e8"}},result.updated_title)," ",
          h("button",{style:{background:"#E8FF4715",border:"1px solid #E8FF4740",borderRadius:"5px",padding:"2px 8px",fontSize:"11px",color:"#E8FF47"},onClick:()=>{
            const upd=state.tasks.map(t=>t.id===task.id?{...t,title:result.updated_title}:t);

            saveTasks(upd); setState({tasks:upd});
          }},"Применить")

        analysisArea.appendChild(tb);
      }

      analysisArea.style.display="block";
      analysisArea.textContent="Ошибка: "+e.message;

    analyzeNotesBtn.disabled=false;

  notes.forEach(n=>{
    const nr=h("div",{style:{background:"#0f0f1e",border:"1px solid #141422",borderRadius:"8px",padding:"10px 12px",marginBottom:"6px",display:"flex",gap:"8px",alignItems:"flex-start",cursor:"pointer",transition:"border-color 0.15s"}});

      refreshAnalyzeBtn();

    const ntxt=h("div",{style:{flex:"1"}});

  const info=h("div",{style:{flex:"1"}});
  const titleRow=h("div",{style:{fontSize:"14px",color:"#e0f0ee",fontWeight:"500",display:"flex",alignItems:"center",gap:"6px"}});
  titleRow.append(h("span",{style:{color:"#4ECDC4",fontSize:"12px"}},"📅"),document.createTextNode(ev.title));
  info.appendChild(titleRow);
  if(ev.startDT){
    const sd=new Date(ev.startDT);
    const hh=String(sd.getHours()).padStart(2,"0"), mm=String(sd.getMinutes()).padStart(2,"0");
    const dStr=sd.toLocaleDateString(i18n().locale,{weekday:"short",day:"numeric",month:"short"});
    const dur=ev.endDT?Math.round((new Date(ev.endDT)-sd)/60000):null;
    const timeStr=hh+":"+mm+(dur?" · "+fmtDuration(dur*60000):"");
    info.appendChild(h("div",{style:{fontSize:"11px",color:"#3a5a5a",fontFamily:"monospace",marginTop:"3px"}},dStr+" · "+timeStr));
  }
  card.appendChild(info);
  const btns=h("div",{style:{display:"flex",gap:"4px"}});
  btns.appendChild(h("button",{style:{background:"transparent",border:"none",fontSize:"13px",padding:"2px 6px",color:"#4a6a6a",cursor:"pointer"},title:"Edit",onClick:(e)=>{
    e.stopPropagation();
    let date=todayStr(), time="09:00", dur=60;
    if(ev.startDT){ const sd=new Date(ev.startDT); date=sd.toISOString().slice(0,10); time=String(sd.getHours()).padStart(2,"0")+":"+String(sd.getMinutes()).padStart(2,"0"); }
    if(ev.startDT&&ev.endDT) dur=Math.round((new Date(ev.endDT)-new Date(ev.startDT))/60000)||60;
    _calModalData={mode:"edit",eventId:ev.id,title:ev.title,date,time,durationMin:dur};
    setState({modal:"cal"});
  }},"✏"));
  btns.appendChild(h("button",{style:{background:"transparent",border:"none",fontSize:"11px",padding:"2px 5px",color:"#444",opacity:"0.4",cursor:"pointer"},onClick:async (e)=>{
    e.stopPropagation();
    if(!confirm("Delete this calendar event?")) return;
    try{ await gcalDeleteCalEvent(ev.id); render(); } catch(ex){ alert("Error: "+ex.message); }
  }},"✕"));
  card.appendChild(btns);
  return card;
}

// ── CALENDAR MODAL ─────────────────────────────────────────────────────────
function buildCalendarModal(){
  const d=_calModalData;
  if(!d) return h("div",{});
  const isEdit=d.mode==="edit";
  const ov=buildOverlay(()=>setState({modal:null}));
  const modal=h("div",{style:{background:"#0d0d1a",border:"1px solid #181828",borderRadius:"16px",padding:"28px",width:"100%",maxWidth:"400px"},onClick:e=>e.stopPropagation()});
  const mhdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}});
  mhdr.append(
    h("div",{style:{fontSize:"10px",fontFamily:"monospace",color:"#4ECDC4",letterSpacing:"1.5px"}},isEdit?i18n().calEditTitle:i18n().calAddTitle),
    h("button",{style:{background:"transparent",border:"none",color:"#444",fontSize:"16px",padding:"4px"},onClick:()=>setState({modal:null})},"✕")
  );
  modal.appendChild(mhdr);
  // Title
  const tInp=h("input",{value:d.title,style:{width:"100%",background:"#0f0f1e",border:"1px solid #1e1e30",borderRadius:"8px",padding:"11px 13px",color:"#f0f0e8",fontSize:"14px",fontFamily:"'DM Sans',sans-serif",marginBottom:"14px"}});
  tInp.addEventListener("input",e=>{ _calModalData.title=e.target.value; });
  modal.appendChild(tInp);
  // Date
  modal.appendChild(h("div",{style:{fontSize:"10px",color:"#444",fontFamily:"monospace",marginBottom:"6px",letterSpacing:"0.5px"}},i18n().calDate));
  const dInp=h("input",{type:"date",value:d.date,style:{width:"100%",background:"#0f0f1e",border:"1px solid #1e1e30",borderRadius:"8px",padding:"11px 13px",color:"#f0f0e8",fontSize:"14px",fontFamily:"'DM Sans',sans-serif",marginBottom:"14px",colorScheme:"dark"}});
  dInp.addEventListener("change",e=>{ _calModalData.date=e.target.value; });
  modal.appendChild(dInp);
  // Time
  modal.appendChild(h("div",{style:{fontSize:"10px",color:"#444",fontFamily:"monospace",marginBottom:"6px",letterSpacing:"0.5px"}},i18n().calTime));
  const tmInp=h("input",{type:"time",value:d.time,style:{width:"100%",background:"#0f0f1e",border:"1px solid #1e1e30",borderRadius:"8px",padding:"11px 13px",color:"#f0f0e8",fontSize:"14px",fontFamily:"'DM Sans',sans-serif",marginBottom:"14px",colorScheme:"dark"}});
  tmInp.addEventListener("change",e=>{ _calModalData.time=e.target.value; });
  modal.appendChild(tmInp);
  // Duration
  modal.appendChild(h("div",{style:{fontSize:"10px",color:"#444",fontFamily:"monospace",marginBottom:"6px",letterSpacing:"0.5px"}},i18n().calDuration));
  const durRow=h("div",{style:{display:"flex",gap:"6px",marginBottom:"20px",flexWrap:"wrap"}});
  [[15,"15м"],[30,"30м"],[60,"1ч"],[90,"1.5ч"],[120,"2ч"],[180,"3ч"]].forEach(([mins,lbl])=>{
    durRow.appendChild(h("button",{
      style:{padding:"6px 12px",borderRadius:"6px",border:`1px solid ${d.durationMin===mins?"#4ECDC4":"#252540"}`,fontSize:"12px",background:d.durationMin===mins?"#4ECDC420":"transparent",color:d.durationMin===mins?"#4ECDC4":"#666"},
      onClick:()=>{ _calModalData.durationMin=mins; render(); }
    },lbl));
  });
  modal.appendChild(durRow);
  const saveBtn=h("button",{style:{background:"#4ECDC4",color:"#0a0a14",border:"none",borderRadius:"10px",padding:"13px 24px",fontSize:"14px",fontWeight:"700",width:"100%"},
    onClick:async ()=>{
      if(!_calModalData.title.trim()) return;
      saveBtn.textContent="Saving..."; saveBtn.disabled=true;
      try{
        if(isEdit) await gcalUpdateEvent(_calModalData.eventId,_calModalData.title,_calModalData.date,_calModalData.time,_calModalData.durationMin);
        else await gcalAddEvent(_calModalData.title,_calModalData.date,_calModalData.time,_calModalData.durationMin);
        await gcalFetchEvents();
        setState({modal:null});
      } catch(e){
        saveBtn.textContent=isEdit?i18n().calUpdate:i18n().calSave;
        saveBtn.disabled=false;
        alert("Error: "+(e.message||"Failed"));
      }
    }
  },isEdit?i18n().calUpdate:i18n().calSave);
  modal.appendChild(saveBtn);
  ov.appendChild(modal);
  return ov;
}

// ── INIT ───────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", async ()=>{
  // Register Service Worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }

  // Check auth
  const session = await getSession();

  if(!session){
    renderLogin();
    return;
  }

  // Загружаем данные из Supabase и кладём в localStorage
  const cloud = await loadUserData();
  if(cloud){
    localStorage.setItem("fo_tasks", JSON.stringify(cloud.tasks || []));
    localStorage.setItem("fo_energy", JSON.stringify(cloud.energy || {}));
    state.tasks = cloud.tasks || [];
    // Bug fix: sync energy from cloud so mood prompt isn't shown if already set on another device
    const ce = cloud.energy;
    if(ce && ce.date === todayStr()) state.energy = ce.level;
  }

  // Сохраняем при скрытии вкладки или закрытии
  document.addEventListener("visibilitychange", ()=>{
    if(document.visibilityState==="hidden" && _currentUser) pushUserData();
  });
  window.addEventListener("beforeunload", ()=>{
    if(_currentUser) pushUserData();
  });

  // Если прошлая сессия не успела сохранить — сохраняем сейчас
  if(localStorage.getItem("fo_pending_save")==="1"){
    localStorage.removeItem("fo_pending_save");
    pushUserData();
  }

  if(!state.energy) state.modal="energy";
  render();

  // Подписываемся на real-time изменения от других устройств
  subscribeRealtime();

  // Init Google Calendar if previously connected
  if(gcalIsConnected() && _gcalCalendarId){
    gcalFetchEvents().then(()=>render()).catch(()=>{});
  }

  // Слушаем изменения auth (на случай логаута в другой вкладке)
  supa.auth.onAuthStateChange((event)=>{
    if(event==="SIGNED_OUT"){ unsubscribeRealtime(); _currentUser=null; renderLogin(); }
  });
});
</script>
